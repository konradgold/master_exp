wandb:
  enable: true
  project: "Thesis-Goldenbaum"
  entity: "konradgoldenbaum-hasso-plattner-institut"
  run_name: weighted_mvit_finder
  log_frequency: 10  # log every N iterations

data_path: /sc/home/konrad.goldenbaum/data/SoccerData/mvfouls

epochs: 40
train_batch_size: 4
val_batch_size: 1
lr: 1e-3
min_lr: 1e-5
warmup_start_lr: 1e-4
fastai_lr:
  enable: false
warmup_epochs: 15
weight_decay: 0.01
num_views: 2
start_frame: 0.0
end_frame: 125.0
fps: 25
num_workers: 4
grad_accum_steps: 4
label_smoothing: 0.0
eval_every_n_epochs: 10
phase: train

use_weighted_sampler: true

# Multi-phase training schedule
# Each entry: [start_epoch, phase, lr]
# Phases: "train" = frozen backbone, "pretrain" = unfrozen backbone
phase_schedule:
  enable: true
  transition_epochs: 5 # Epochs at which to transition phases
  schedule:
    - [1, "train", 1e-3, 12]       # Epochs 1-15: train head only
    - [16, "pretrain", 8e-6, 8]   # Epochs 16-35: fine-tune everything  
    - [36, "train", 1e-4, 12]      # Epochs 36+: freeze backbone again

checkpoint:
  resume: true
  store: false
  only_weights: true
  resume_from: checkpoints/best_checkpoint_20_Action_BA=0.1458.pt
  path: checkpoints

debug: 
  enable: false
  size: 64

