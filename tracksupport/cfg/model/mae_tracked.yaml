# @package _global_
#
# VideoMAE model with interleaved TrackTention blocks.
# Selected via: torchrun ... src/runs/train.py model=mae_tracked

model_type: mae_tracked

model_hf: MCG-NJU/videomae-base
max_track_tokens: 10
hpatches: 14          # 224 / 16 = 14 patches per spatial dim
wpatches: 14
num_heads: 2
embedding_dim: 768    # VideoMAE-base hidden size
window_decay: 0.5
num_frames: 16        # VideoMAE-base default
tubelet_size: 2       # temporal tokens = num_frames / tubelet_size = 8
track_model: rtdetr-l.pt
patch_number: 14
use_sdpa: true
num_classes: 8

# Indices of backbone layers AFTER which a TrackTention block is inserted.
# VideoMAE-base has 12 layers (indices 0-11).
# E.g. [3, 7, 11] inserts TrackTention after layers 3, 7, and 11.
tracktention_layer_indices: [3, 7, 11]

# LoRA adapter configuration for the VideoMAE encoder.
lora:
  enable: true
  r: 16
  alpha: 32
  init_weights: true

TrackTransformer:
  num_layers: 2
